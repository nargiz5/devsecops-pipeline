services:
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    restart: always
    ports:
      - "8200:8200"
    environment:
      # These must be indented under environment
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      SKIP_SETCAP: 'true'  # <--- Make sure it is indented here!
    cap_add:
      - IPC_LOCK
      - SETFCAP
    command: server -dev
    networks:
      - devsecops-net

