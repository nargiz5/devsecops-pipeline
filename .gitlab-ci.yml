977385d5c6a7e20","vuln_id_from_tool":null,"sast_source_object":null,"sast_sink_object":null,"sast_source_line":null,"sast_source_file_path":null,"nb_occurences":null,"publish_date":null,"service":null,"planned_remediation_date":null,"planned_remediation_version":null,"effort_for_fixing":null,"test":2,"duplicate_finding":null,"review_requested_by":null,"defect_review_requested_by":null,"last_reviewed_by":1,"sonarqube_issue":null,"reviewers":[],"notes":[],"files":[]},{"id":7,"mitigated":null,"mitigated_by":null,"tags":[],"request_response":{"req_resp":[]},"accepted_risks":[],"push_to_jira":false,"found_by":[233],"age":0,"sla_days_remaining":30,"finding_meta":[],"related_fields":null,"jira_creation":null,"jira_change":null,"display_status":"Active, Verified","finding_groups":[],"vulnerability_ids":[],"reporter":1,"endpoints":[],"created":"2026-04-16T13:24:02.916203Z","updated":"2026-04-16T13:24:02.916215Z","title":"Improper Neutralization of Special Elements Used in an SQL Command ('SQL Injection')","date":"2026-04-16","sla_start_date":null,"sla_expiration_date":"2026-05-16","cwe":89,"epss_score":null,"epss_percentile":null,"known_exploited":false,"ransomware_used":false,"kev_date":null,"cvssv3":null,"cvssv3_score":null,"cvssv4":null,"cvssv4_score":null,"url":null,"severity":"High","description":"Scanner: Semgrep\nSQL Injection is a critical vulnerability that can lead to data or system compromise. By\ndynamically generating SQL query strings, user input may be able to influence the logic of\nthe SQL statement. This could lead to an adversary accessing information they should\nnot have access to, or in some circumstances, being able to execute OS functionality or code.\n\nReplace all dynamically generated SQL queries with parameterized queries. In situations where\ndynamic queries must be created, never use direct user input, but instead use a map or\ndictionary of valid values and resolve them using a user supplied key.\n\nFor example, some database drivers do not allow parameterized queries for `>` or `<` comparison\noperators. In these cases, do not use a user supplied `>` or `<` value, but rather have the\nuser\nsupply a `gt` or `lt` value. The alphabetical values are then used to look up the `>` and `<`\nvalues to be used in the construction of the dynamic query. The same goes for other queries\nwhere\ncolumn or table names are required but cannot be parameterized.\n\nExample using `PreparedStatement` queries:\n```\nimport sqlite3\n\n# Create a new database (in memory)\ncon = sqlite3.connect(\":memory:\")\n# Get a cursor from the connection\ncur = con.cursor()\n# Create a tuple of the value to be used in the parameterized query\nparams = ('user-input',)\n# execute the statement, passing in the params for the value\ncur.execute(\"select name from sqlite_master where name = ?\", params)\n# work with the result\nresult = cur.fetchall()\n```\n\nFor more information on SQL Injection see OWASP:\nhttps://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html\n\n","mitigation":"","fix_available":null,"fix_version":null,"impact":null,"steps_to_reproduce":null,"severity_justification":null,"references":"Identifier type: semgrep_id\nName: bandit.B608\nValue: bandit.B608\nURL: https://semgrep.dev/r/gitlab.bandit.B608\n\nIdentifier type: owasp\nName: A03:2021 - Injection\nValue: A03:2021\n\nIdentifier type: owasp\nName: A1:2017 - Injection\nValue: A1:2017\n\nIdentifier type: bandit_test_id\nName: Bandit Test ID B608\nValue: B608\n\n","active":true,"verified":true,"false_p":false,"duplicate":false,"out_of_scope":false,"risk_accepted":false,"under_review":false,"last_status_update":"2026-04-16T13:24:02.916301Z","under_defect_review":false,"is_mitigated":false,"thread_id":0,"numerical_severity":"S1","last_reviewed":"2026-04-16T13:24:02.858410Z","param":null,"payload":null,"hash_code":"92bf11fb7aa93eb01cdc9d55e8b51f8e7b38cd097004fb55cb1836571ffc78e8","line":177,"file_path":"taskManager/views.py","component_name":null,"component_version":null,"static_finding":true,"dynamic_finding":false,"scanner_confidence":null,"unique_id_from_tool":"2d344f41ac6d0df07f667ae4d5961cebd077a425e3ce8636a84e6b1169784748","vuln_id_from_tool":null,"sast_source_object":null,"sast_sink_object":null,"sast_source_line":null,"sast_source_file_path":null,"nb_occurences":null,"publish_date":null,"service":null,"planned_remediation_date":null,"planned_remediation_version":null,"effort_for_fixing":null,"test":2,"duplicate_finding":null,"review_requested_by":null,"defect_review_requested_by":null,"last_reviewed_by":1,"sonarqube_issue":null,"reviewers":[],"notes":[],"files":[]},{"id":8,"mitigated":null,"mitigated_by":null,"tags":[],"request_response":{"req_resp":[]},"accepted_risks":[],"push_to_jira":false,"found_by":[233],"age":0,"sla_days_remaining":30,"finding_meta":[],"related_fields":null,"jira_creation":null,"jira_change":null,"display_status":"Active, Verified","finding_groups":[],"vulnerability_ids":[],"reporter":1,"endpoints":[],"created":"2026-04-16T13:24:02.923409Z","updated":"2026-04-16T13:24:02.923422Z","title":"Improper Neutralization of Directives in Dynamically Evaluated Code ('Eval Injection')","date":"2026-04-16","sla_start_date":null,"sla_expiration_date":"2026-05-16","cwe":95,"epss_score":null,"epss_percentile":null,"known_exploited":false,"ransomware_used":false,"kev_date":null,"cvssv3":null,"cvssv3_score":null,"cvssv4":null,"cvssv4_score":null,"url":null,"severity":"High","description":"Scanner: Semgrep\nThe application was found calling the `eval` function OR Function()\n  constructor OR setTimeout() OR setInterval() methods. If the\n\n  variables or strings or functions passed to these methods contains user-supplied input, an adversary could attempt to execute arbitrary\n\n  JavaScript\n\n  code. This could lead to a full system compromise in Node applications or Cross-site Scripting\n\n  (XSS) in web applications.\n\n\n  To remediate this issue, remove all calls to above methods and consider alternative methods for\n\n  executing\n\n  the necessary business logic. There is almost no safe method of calling `eval` or other above stated sinks with\n\n  user-supplied input.\n\n  Instead, consider alternative methods such as using property accessors to dynamically access\n\n  values.\n\n\n  Example using property accessors to dynamically access an object's property:\n\n  ```\n\n  // Define an object\n\n  const obj = {key1: 'value1', key2: 'value2'};\n\n  // Get key dynamically from user input\n\n  const key = getUserInput();\n\n  // Check if the key exists in our object and return it, or a default empty string\n\n  const value = (obj.hasOwnProperty(key)) ? obj[key] : '';\n\n  // Work with the value\n\n  ```\n\n\n  For more information on why not to use `eval`, and alternatives see:\n\n  - https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/eval#never_use_eval!\n\n  Other References:\n\n  - https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Function/Function\n\n  - https://developer.mozilla.org/en-US/docs/Web/API/setTimeout\n\n  - https://developer.mozilla.org/en-US/docs/Web/API/setInterval\n\n","mitigation":"","fix_available":null,"fix_version":null,"impact":null,"steps_to_reproduce":null,"severity_justification":null,"references":"Identifier type: semgrep_id\nName: eslint.detect-eval-with-expression\nValue: eslint.detect-eval-with-expression\nURL: https://semgrep.dev/r/gitlab.eslint.detect-eval-with-expression\n\nIdentifier type: owasp\nName: A03:2021 - Injection\nValue: A03:2021\n\nIdentifier type: owasp\nName: A1:2017 - Injection\nValue: A1:2017\n\nIdentifier type: eslint_rule_id\nName: ESLint rule ID/detect-eval-with-expression\nValue: detect-eval-with-expression\n\n","active":true,"verified":true,"false_p":false,"duplicate":false,"out_of_scope":false,"risk_accepted":false,"under_review":false,"last_status_update":"2026-04-16T13:24:02.923504Z","under_defect_review":false,"is_mitigated":false,"thread_id":0,"numerical_severity":"S1","last_reviewed":"2026-04-16T13:24:02.858410Z","param":null,"payload":null,"hash_code":"6c2c69629e1bc0b7b5a8031bda11d351e6999b5d2bd044865b6f380847f6281e","line":1932,"file_path":"taskManager/static/taskManager/js/backend/jquery.datetimepicker.js","component_name":null,"component_version":null,"static_finding":true,"dynamic_finding":false,"scanner_confidence":null,"unique_id_from_tool":"739f414312abe438ddc6ed7ad620c1b249b5553f3488238f44dab71a6c96cf55","vuln_id_from_tool":null,"sast_source_object":null,"sast_sink_object":null,"sast_source_line":null,"sast_source_file_path":null,"nb_occurences":null,"publish_date":null,"service":null,"planned_remediation_date":null,"planned_remediation_version":null,"effort_for_fixing":null,"test":2,"duplicate_finding":null,"review_requested_by":null,"defect_review_requested_by":null,"last_reviewed_by":1,"sonarqube_issue":null,"reviewers":[],"notes":[],"files":[]},{"id":9,"mitigated":null,"mitigated_by":null,"tags":[],"request_response":{"req_resp":[]},"accepted_risks":[],"push_to_jira":false,"found_by":[233],"age":0,"sla_days_remaining":30,"finding_meta":[],"related_fields":null,"jira_creation":null,"jira_change":null,"display_status":"Active, Verified","finding_groups":[],"vulnerability_ids":[],"reporter":1,"endpoints":[],"created":"2026-04-16T13:24:02.930187Z","updated":"2026-04-16T13:24:02.930199Z","title":"Improper Neutralization of Directives in Dynamically Evaluated Code ('Eval Injection')","date":"2026-04-16","sla_start_date":null,"sla_expiration_date":"2026-05-16","cwe":95,"epss_score":null,"epss_percentile":null,"known_exploited":false,"ransomware_used":false,"kev_date":null,"cvssv3":null,"cvssv3_score":null,"cvssv4":null,"cvssv4_score":null,"url":null,"severity":"High","description":"Scanner: Semgrep\nThe application was found calling the `eval` function OR Function()\n  constructor OR setTimeout() OR setInterval() methods. If the\n\n  variables or strings or functions passed to these methods contains user-supplied input, an adversary could attempt to execute arbitrary\n\n  JavaScript\n\n  code. This could lead to a full system compromise in Node applications or Cross-site Scripting\n\n  (XSS) in web applications.\n\n\n  To remediate this issue, remove all calls to above methods and consider alternative methods for\n\n  executing\n\n  the necessary business logic. There is almost no safe method of calling `eval` or other above stated sinks with\n\n  user-supplied input.\n\n  Instead, consider alternative methods such as using property accessors to dynamically access\n\n  values.\n\n\n  Example using property accessors to dynamically access an object's property:\n\n  ```\n\n  // Define an object\n\n  const obj = {key1: 'value1', key2: 'value2'};\n\n  // Get key dynamically from user input\n\n  const key = getUserInput();\n\n  // Check if the key exists in our object and return it, or a default empty string\n\n  const value = (obj.hasOwnProperty(key)) ? obj[key] : '';\n\n  // Work with the value\n\n  ```\n\n\n  For more information on why not to use `eval`, and alternatives see:\n\n  - https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/eval#never_use_eval!\n\n  Other References:\n\n  - https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Function/Function\n\n  - https://developer.mozilla.org/en-US/docs/Web/API/setTimeout\n\n  - https://developer.mozilla.org/en-US/docs/Web/API/setInterval\n\n","mitigation":"","fix_available":null,"fix_version":null,"impact":null,"steps_to_reproduce":null,"severity_justification":null,"references":"Identifier type: semgrep_id\nName: eslint.detect-eval-with-expression\nValue: eslint.detect-eval-with-expression\nURL: https://semgrep.dev/r/gitlab.eslint.detect-eval-with-expression\n\nIdentifier type: owasp\nName: A03:2021 - Injection\nValue: A03:2021\n\nIdentifier type: owasp\nName: A1:2017 - Injection\nValue: A1:2017\n\nIdentifier type: eslint_rule_id\nName: ES