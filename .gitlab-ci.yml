stages:
  - test
  - upload
  - gate
variables:
  SAST_ANALYZER_IMAGE_PREFIX: "192.168.64.2:5002/adminuser/django-nv-import/sast-tools"
  TELEGRAM_TOKEN: "8743571898:AAFhpgx11alAvRxAaa_Z1VjdUYEnSDmZGaI"
  TELEGRAM_CHAT_ID: "5197504727"

  DOCKER_AUTH_CONFIG: >-
    {
      "auths": {
        "192.168.64.2:5002": {
          "auth": "YWRtaW51c2VyOk15UzNjdXJlIVJvb3RAMjAyNg=="
        }
      }
    }

# ---------------- TEST 1 ----------------
semgrep-sast-1:
  stage: test
  image: $SAST_ANALYZER_IMAGE_PREFIX/semgrepp:latest
  artifacts:
    reports:
      sast: gl-sast-report-1.json
    paths:
      - gl-sast-report-1.json
    when: always
  script:
    - /analyzer run
    - mv gl-sast-report.json gl-sast-report-1.json
    - ls -la

upload-test-1:
  stage: upload
  image: curlimages/curl:latest
  needs:
    - job: semgrep-sast-1
      artifacts: true
  script:
    - >
      curl -X POST "http://192.168.64.2:8080//api/v2/reimport-scan/"
      -H "Authorization: Token 74e541830edbc4902f71b92f61b4ac2f4bdc72b4"
      -F "active=true"
      -F "verified=true"
      -F "scan_type=GitLab SAST Report"
      -F "minimum_severity=High"
      -F "product_name=django-nv-import-1775763604"
      -F "engagement_name=CI-CD Scan 1775763604"
      -F "test_title=Semgrep Scan - Test 1"
      -F "auto_create_context=true"
      -F "file=@gl-sast-report-1.json"

# ---------------- TEST 2 ----------------
semgrep-sast-2:
  stage: test
  image: $SAST_ANALYZER_IMAGE_PREFIX/semgrepp:latest
  artifacts:
    reports:
      sast: gl-sast-report-2.json
    paths:
      - gl-sast-report-2.json
    when: always
  script:
    - /analyzer run
    - mv gl-sast-report.json gl-sast-report-2.json
    - ls -la

upload-test-2:
  stage: upload
  image: curlimages/curl:latest
  needs:
    - job: semgrep-sast-2
      artifacts: true
  script:
    - >
      curl -X POST "http://192.168.64.2:8080//api/v2/reimport-scan/"
      -H "Authorization: Token 74e541830edbc4902f71b92f61b4ac2f4bdc72b4"
      -F "active=true"
      -F "verified=true"
      -F "scan_type=GitLab SAST Report"
      -F "minimum_severity=High"
      -F "product_name=django-nv-import-1775763604"
      -F "engagement_name=CI-CD Scan 1775763604"
      -F "test_title=Semgrep Scan - Test 2"
      -F "auto_create_context=true"
      -F "file=@gl-sast-report-2.json"

# --- SECURITY GATE (Test 1 Only) ---
# ---------------- SECURITY GATE (Test 1 Focus Only) ----------------
security-gate:
  stage: gate
  image: curlimages/curl:latest
  needs: ["upload-test-1"]
  script:
    - |
      echo "🔍 Verifying security status for Test 1..."
      
      # 1. Query DefectDojo for active/verified findings
      RESPONSE=$(curl -s -H "Authorization: Token 74e541830edbc4902f71b92f61b4ac2f4bdc72b4"         "http://192.168.64.2:8080//api/v2/findings/?active=true&verified=true&test__title=Semgrep%20Scan%20-%20Test%201")
      
      # 2. Extract count and ensure it defaults to 0 if empty/null
      COUNT=$(echo $RESPONSE | grep -o '"count":[0-9]*' | cut -d: -f2)
      COUNT=${COUNT:-0}
      
      echo "Findings Count: $COUNT"

      if [ "$COUNT" -gt 0 ]; then
        # ❌ FAIL LOGIC (Echo only, no exit 1)
        HASHES=$(echo $RESPONSE | grep -o '"hash_code":"[^"]*"' | cut -d'"' -f4 | head -n 5)
        
        MSG="❌ *Security Gate Warning (Test 1)*%0AFound $COUNT active vulnerabilities.%0A%0A*Top Hashes:*%0A$HASHES%0A%0A_Pipeline continuing in Soft Fail mode._"
        
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage"              -d "chat_id=${TELEGRAM_CHAT_ID}" -d "text=$MSG" -d "parse_mode=Markdown"
             
        echo "GATE STATUS: WARNING - $COUNT active findings remain. Review in Dojo."
      else
        # ✅ SUCCESS LOGIC
        MSG="✅ *Security Gate Passed (Test 1)*%0ANo active findings (All fixed or False Positive)."
        
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage"              -d "chat_id=${TELEGRAM_CHAT_ID}" -d "text=$MSG" -d "parse_mode=Markdown"
             
        echo "GATE STATUS: SUCCESS - No active findings."
      fi
      
      # Always exit 0 to keep the GitLab pipeline Green
      exit 0


